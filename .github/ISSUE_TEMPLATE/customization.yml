name: 技能定制需求
description: 提交您的创作需求，我们将为您定制专属的虚构文学创作技能方案
title: "[定制] "
labels: ["Request for Quotation"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您对虚构文学创作框架的关注！

        请填写以下信息，帮助我们了解您的创作需求，以便为您提供最合适的定制方案。

        带 * 为必填项。

  - type: input
    id: contact
    attributes:
      label: 联系方式
      description: 邮箱或其他联系方式，方便我们回复您
      placeholder: your@email.com
    validations:
      required: true

  - type: dropdown
    id: genre
    attributes:
      label: 写作类型 *
      description: 您计划创作的主要类型（可多选）
      multiple: true
      options:
        - 科幻 / 异能
        - 玄幻 / 奇幻
        - 现实都市
        - 悬疑 / 推理
        - 情感 / 言情
        - 历史 / 权谋
        - 日常系 / 慢生活
        - 恐怖 / 惊悚
        - 军事 / 战争
        - 游戏 / 电竞
        - 其他
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: 作品形式 *
      description: 您计划的创作形式
      multiple: false
      options:
        - 长篇连载（网络平台）
        - 长篇完结（实体出版）
        - 中篇（3-10 万字）
        - 短篇集 / 短篇矩阵
        - 多卷本系列
        - 其他
    validations:
      required: true

  - type: dropdown
    id: target-audience
    attributes:
      label: 目标读者 *
      description: 您的主要目标读者群体
      multiple: true
      options:
        - 青少年（14-18 岁）
        - 青年（18-30 岁）
        - 成年（30 岁以上）
        - 全年龄向
        - 女性向
        - 男性向
        - 核心向 / 硬核读者
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 发布平台 *
      description: 您计划发布的主要平台
      multiple: true
      options:
        - 起点中文网
        - 晋江文学城
        - 番茄小说
        - 七猫小说
        - 刺猬猫
        - 长佩文学
        - 豆瓣阅读
        - 知乎盐选
        - 实体出版
        - 海外平台（Webnovel 等）
        - 自建平台 / 个人站
        - 其他
    validations:
      required: true

  - type: dropdown
    id: monthly-traffic
    attributes:
      label: 预期月访问量 / 读者规模
      description: 您预期的月度读者规模（用于评估并发与推荐需求）
      multiple: false
      options:
        - 起步期（< 1 万 PV/月）
        - 成长期（1-10 万 PV/月）
        - 成熟期（10-100 万 PV/月）
        - 头部（> 100 万 PV/月）
        - 不确定 / 新项目
    validations:
      required: false

  - type: dropdown
    id: update-frequency
    attributes:
      label: 更新频率
      description: 您计划的更新节律
      multiple: false
      options:
        - 日更
        - 隔日更
        - 周更 2-3 次
        - 周更 1 次
        - 不定期
        - 已有存稿，一次性发布
    validations:
      required: false

  - type: textarea
    id: project-description
    attributes:
      label: 项目简介
      description: 简要描述您的创作项目——题材、核心卖点、目前所处阶段等
      placeholder: |
        例如：
        - 一本都市异能长篇连载，主角是拥有时间回溯能力的外卖员
        - 已有 5 万字存稿，计划在起点连载，目标日更 4000 字
        - 希望框架帮助规划大纲、控制节奏、保持人设一致性
    validations:
      required: false

  - type: textarea
    id: pain-points
    attributes:
      label: 当前痛点
      description: 您在创作过程中遇到的主要困难或希望框架解决的问题
      placeholder: |
        例如：
        - 大纲写到中段就散了，伏笔收不回来
        - 多角色 POV 切换时声音雷同
        - 不确定目标读者到底喜欢什么
        - 翻译腔严重，想提升中文表达质量
    validations:
      required: false

  - type: textarea
    id: customization-needs
    attributes:
      label: 定制需求
      description: 您希望框架在哪些方面进行定制（如特定类型的叙事结构、专属评审维度、行业术语适配等）
      placeholder: |
        例如：
        - 希望增加「网文爽点节奏」专项评分维度
        - 需要针对「悬疑推理」类型的专属结构工具
        - 希望 MBTI 读者角色增加更多类型
        - 需要适配特定平台的发布规范
    validations:
      required: false

  - type: dropdown
    id: budget
    attributes:
      label: 预算范围
      description: 您的预算区间（人民币），帮助我们匹配合适的方案
      multiple: false
      options:
        - < 5,000 元
        - 5,000 - 20,000 元
        - 20,000 - 50,000 元
        - 50,000 元以上
        - 待定 / 先了解方案再决定
    validations:
      required: false

  - type: dropdown
    id: urgency
    attributes:
      label: 时间预期
      description: 您希望多久内完成定制交付
      multiple: false
      options:
        - 1 周内
        - 2-4 周
        - 1-2 个月
        - 不急，按正常排期
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他您认为我们需要了解的内容
      placeholder: 任何额外的背景信息、参考作品、特殊要求等
    validations:
      required: false
